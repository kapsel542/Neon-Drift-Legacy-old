<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drift: IDENTITY</title>
    <style>
        body { margin: 0; background: #010103; color: #0ff; font-family: 'Consolas', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 4px solid #f00; box-shadow: 0 0 20px #f00; background: #000; cursor: none; }
        
        .overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; backdrop-filter: blur(10px); }
        .btn { background: #000; border: 2px solid #0ff; color: #0ff; cursor: pointer; padding: 15px 40px; font-family: inherit; font-size: 1.5rem; transition: 0.2s; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 25px #0ff; }

        /* Nickname Input */
        #nickInput { background: #111; border: 2px solid #f0f; color: #f0f; padding: 10px; font-family: inherit; font-size: 1.2rem; text-align: center; outline: none; margin-bottom: 10px; }

        /* Modernized Shop UI */
        .sidebar { position: absolute; top: 0; width: 380px; height: 100%; background: rgba(5, 5, 15, 0.98); padding: 25px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        #shop { left: -400px; border-right: 3px solid #ff0; }
        #shop.open { left: 0; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .shop-item { background: #111; border: 1px solid #333; padding: 12px; cursor: pointer; text-align: center; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .shop-item:hover { border-color: #ff0; background: #1a1a00; }
        .shop-item.owned { border-color: #0f0; }
        .shop-item.active-item { background: #003333; border-color: #0ff; box-shadow: inset 0 0 10px #0ff; }
        .shop-item b { font-size: 0.8rem; color: #ff0; }

        #leaderboard { right: -400px; border-left: 3px solid #0ff; }
        #leaderboard.open { right: 0; }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #222; }
        .you-rank { color: #f0f; background: rgba(255,0,255,0.1); border-color: #f0f; font-weight: bold; }

        .nav-group { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1100; }
        .nav-btn { background: #000; border: 1px solid #0ff; color: #0ff; padding: 8px 15px; cursor: pointer; font-family: inherit; text-transform: uppercase; }
        
        #console { position: absolute; bottom: 20px; left: 20px; background: #000; border: 1px solid #0f0; padding: 5px; display: none; z-index: 2000; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="startScreen" class="overlay">
        <h1 style="font-size: 4rem; text-shadow: 0 0 20px #0ff;">NEON DRIFT</h1>
        <input type="text" id="nickInput" placeholder="ENTER PILOT TAG" maxlength="12">
        <button class="btn" onclick="initGame()">INITIATE</button>
    </div>

    <div id="deathScreen" class="overlay" style="display:none">
        <h1 style="color:#f0f">CORE RUPTURE</h1>
        <p>PILOT: <span id="displayNick" style="color:#0ff"></span></p>
        <p>SCORE: <span id="finalScore">0</span> | BEST: <span id="bestScore">0</span></p>
        <button class="btn" onclick="resetGame()">RE-INITIALIZE</button>
    </div>

    <div class="nav-group">
        <button class="nav-btn" onclick="toggleMenu('shop')">MARKET</button>
        <button class="nav-btn" onclick="toggleMenu('leaderboard')">RANKS</button>
    </div>
    
    <div id="ui">
        <div id="scoreDisplay">SCORE: 0</div>
        <div style="color:#ff0">UP: <span id="upCount">0</span></div>
        <div id="hullDisplay" style="color:#0f0; font-size: 0.8rem;"></div>
    </div>

    <div id="shop" class="sidebar">
        <h2 style="color:#ff0; text-align:center; margin-bottom:5px;">NEON MARKET</h2>
        <div style="text-align:center; font-size: 0.7rem; color: #888; margin-bottom:15px;">UPGRADES PERSIST FOREVER</div>
        <div id="shopGrid" class="shop-grid"></div>
    </div>

    <div id="leaderboard" class="sidebar">
        <h2 style="color:#0ff; text-align:center;">TOP PILOTS</h2>
        <div id="lbContent"></div>
    </div>

    <div id="console"><input type="text" id="consoleInput" style="background:transparent; border:none; color:#0f0; outline:none; width:300px; font-family:inherit;"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 600;

        let score = 0, up = parseInt(localStorage.getItem('driftUP')) || 0;
        let bestScore = parseInt(localStorage.getItem('driftBest')) || 0;
        let pilotNick = localStorage.getItem('driftNick') || "";
        let gameActive = false, godMode = false, hue = 0, hull = 0;

        const player = { x: 450, y: 300, size: 10, tx: 450, ty: 300, trail: [], speed: 0.12 };
        let activeSkins = JSON.parse(localStorage.getItem('driftSkinsActive')) || ['default'];
        let ownedItems = JSON.parse(localStorage.getItem('driftOwned')) || ['default'];
        let enemies = [], points = [];

        const inventory = [
            { id: 'default', name: 'Standard', type: 'skin', cost: 0, color: '#0ff' },
            { id: 'neon_red', name: 'Blood', type: 'skin', cost: 1000, color: '#f00' },
            { id: 'gold', name: 'Midas', type: 'skin', cost: 5000, color: '#ff0' },
            { id: 'void', name: 'Void', type: 'skin', cost: 8000, color: '#a0f' },
            { id: 'rainbow', name: 'RGB', type: 'skin', cost: 25000, color: 'dynamic' },
            { id: 'diamond', name: 'Diamond', type: 'shape', cost: 12000 },
            { id: 'magnet', name: 'Magnet', type: 'gear', cost: 7500 },
            { id: 'drone', name: 'Drone', type: 'gear', cost: 20000 },
            { id: 'hull', name: 'Hull+', type: 'gear', cost: 15000 },
            { id: 'speed', name: 'Speed+', type: 'gear', cost: 10000 }
        ];

        if (pilotNick) document.getElementById('nickInput').value = pilotNick;

        function initGame() {
            pilotNick = document.getElementById('nickInput').value || "PILOT_X";
            localStorage.setItem('driftNick', pilotNick);
            document.getElementById('startScreen').style.display = 'none';
            gameActive = true;
            resetStats();
            loop();
        }

        function resetStats() {
            hull = activeSkins.includes('hull') ? 1 : 0;
            player.speed = activeSkins.includes('speed') ? 0.22 : 0.12;
            document.getElementById('hullDisplay').innerText = hull > 0 ? "HULL INTEGRITY: NOMINAL" : "";
        }

        function getLeaderboard() {
            let board = JSON.parse(localStorage.getItem('driftLB')) || 
                Array.from({length: 10}, (_, i) => ({ name: "CPU_" + (i+1), score: (10 - i) * 500 }));
            let found = board.find(p => p.name === pilotNick);
            if (!found) board.push({ name: pilotNick, score: bestScore });
            else found.score = bestScore;
            return board.sort((a,b) => b.score - a.score).slice(0, 100);
        }

        function updateLBDisplay() {
            const board = getLeaderboard();
            document.getElementById('lbContent').innerHTML = board.map((p, i) => `
                <div class="rank-item ${p.name === pilotNick ? 'you-rank' : ''}">
                    <span>#${i+1} ${p.name}</span><span>${p.score}</span>
                </div>
            `).join('');
        }

        function buyItem(item) {
            if (ownedItems.includes(item.id)) {
                if (item.type === 'skin' || item.type === 'shape') {
                    activeSkins = activeSkins.filter(id => inventory.find(i => i.id === id).type !== item.type);
                    activeSkins.push(item.id);
                } else {
                    if (activeSkins.includes(item.id)) activeSkins = activeSkins.filter(i => i !== item.id);
                    else activeSkins.push(item.id);
                }
            } else if (up >= item.cost) { up -= item.cost; ownedItems.push(item.id); activeSkins.push(item.id); }
            save(); updateShop(); resetStats();
        }

        function save() {
            localStorage.setItem('driftUP', up);
            localStorage.setItem('driftOwned', JSON.stringify(ownedItems));
            localStorage.setItem('driftSkinsActive', JSON.stringify(activeSkins));
            document.getElementById('upCount').innerText = up;
        }

        function updateShop() {
            document.getElementById('shopGrid').innerHTML = inventory.map(item => `
                <div class="shop-item ${ownedItems.includes(item.id) ? 'owned' : ''} ${activeSkins.includes(item.id) ? 'active-item' : ''}" onclick='buyItem(${JSON.stringify(item)})'>
                    <strong>${item.name}</strong>
                    <b>${activeSkins.includes(item.id) ? 'ACTIVE' : ownedItems.includes(item.id) ? 'EQUIP' : item.cost + ' UP'}</b>
                </div>
            `).join('');
        }

        function resetGame() {
            score = 0; enemies = []; points = []; gameActive = true;
            player.x = 450; player.y = 300; player.trail = [];
            document.getElementById('deathScreen').style.display = 'none';
            resetStats();
            loop();
        }

        function endGame(reason) {
            if (hull > 0) { hull--; document.getElementById('hullDisplay').innerText = "HULL CRITICAL!"; return; }
            gameActive = false;
            if (score > bestScore) { bestScore = score; localStorage.setItem('driftBest', bestScore); }
            let board = getLeaderboard().filter(p => p.name !== pilotNick);
            board.push({ name: pilotNick, score: bestScore });
            localStorage.setItem('driftLB', JSON.stringify(board.sort((a,b)=>b.score-a.score).slice(0,100)));
            document.getElementById('displayNick').innerText = pilotNick;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('bestScore').innerText = bestScore;
            document.getElementById('deathScreen').style.display = 'flex';
            updateLBDisplay();
        }

        window.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            player.tx = e.clientX - r.left; player.ty = e.clientY - r.top;
        });

        window.addEventListener('keydown', e => {
            if (e.key === '`') {
                const c = document.getElementById('console');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                if (c.style.display === 'block') document.getElementById('consoleInput').focus();
            }
        });

        document.getElementById('consoleInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const cmd = e.target.value.toLowerCase();
                if (cmd === 'rich') { up += 100000; save(); }
                if (cmd === 'clear') { localStorage.clear(); location.reload(); }
                e.target.value = ''; document.getElementById('console').style.display = 'none';
            }
        });

        function toggleMenu(id) { document.getElementById(id).classList.toggle('open'); }

        function loop() {
            if (!gameActive) return;
            hue++;
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(0,0,900,600);

            player.x += (player.tx - player.x) * player.speed;
            player.y += (player.ty - player.y) * player.speed;

            if (!godMode && (player.x < 10 || player.x > 890 || player.y < 10 || player.y > 590)) endGame("BOUNDARY");

            player.trail.push({x: player.x, y: player.y});
            if (player.trail.length > 22) player.trail.shift();

            let pColor = inventory.find(s => activeSkins.includes(s.id) && s.type === 'skin')?.color || '#0ff';
            if (pColor === 'dynamic') pColor = `hsl(${hue%360}, 100%, 50%)`;

            player.trail.forEach((t, i) => {
                ctx.globalAlpha = i / 22; ctx.fillStyle = pColor;
                if (activeSkins.includes('diamond')) {
                    ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(hue/20);
                    ctx.fillRect(-8*(i/22), -8*(i/22), 16*(i/22), 16*(i/22)); ctx.restore();
                } else {
                    ctx.beginPath(); ctx.arc(t.x, t.y, player.size * (i/22), 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            if (activeSkins.includes('drone')) {
                const dx = player.x + Math.cos(hue/10) * 45;
                const dy = player.y + Math.sin(hue/10) * 45;
                ctx.fillStyle = '#0f0'; ctx.fillRect(dx-4, dy-4, 8, 8);
                enemies.forEach((en, i) => { if (Math.hypot(dx-en.x, dy-en.y) < 22) { enemies.splice(i,1); score += 50; } });
            }

            if (Math.random() < 0.08) enemies.push({x: Math.random()*860+20, y: -20, v: 3+(score/1000)});
            enemies.forEach((en, i) => {
                en.y += en.v;
                if (Math.hypot(player.x-en.x, player.y-en.y) < 18 && !godMode) {
                    enemies.splice(i,1);
                    endGame("COLLISION");
                }
                if (en.y > 620) { enemies.splice(i,1); score += 10; document.getElementById('scoreDisplay').innerText = "SCORE: " + score; }
                ctx.fillStyle = '#f0f'; ctx.fillRect(en.x-8, en.y-8, 16, 16);
            });

            if (Math.random() < 0.015) points.push({x: Math.random()*800+50, y: Math.random()*500+50});
            points.forEach((p, i) => {
                if (activeSkins.includes('magnet') && Math.hypot(player.x-p.x, player.y-p.y) < 160) {
                    p.x += (player.x - p.x) * 0.12; p.y += (player.y - p.y) * 0.12;
                }
                if (Math.hypot(player.x-p.x, player.y-p.y) < 25) { points.splice(i,1); up += 100; save(); }
                ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
            });

            requestAnimationFrame(loop);
        }

        updateShop(); updateLBDisplay(); save();
    </script>
</body>
</html>
